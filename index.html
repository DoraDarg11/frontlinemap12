    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#1a1a1a; font-family:Arial,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
        .header { background:#2a2a2a; padding:10px 20px; display:flex; justify-content:space-between; align-items:center; z-index:10; border-bottom:1px solid #444; flex-shrink:0; }
        .header h1 { color:#ffcc00; font-size:18px; font-weight:bold; text-shadow:0 0 10px rgba(255,204,0,0.3); }
        .header .info { color:#aaa; font-size:13px; display:flex; align-items:center; gap:15px; }
        .header .info .badge { background:#4a6fa5; color:white; padding:3px 12px; border-radius:12px; font-size:12px; }
        #map-container { flex:1; position:relative; overflow:hidden; background:#111; }
        #map { width:100%; height:100%; }
        .coord-info { position:absolute; bottom:10px; left:10px; color:#aaa; font-size:12px; background:rgba(0,0,0,0.8); padding:4px 12px; border-radius:12px; pointer-events:none; z-index:1000; border:1px solid #333; }
        .leaflet-control-zoom { bottom:20px; right:20px; top:auto !important; }
        .leaflet-control-attribution { font-size:10px; opacity:0.7; }
        .flag-marker { background:transparent; border:none; text-align:center; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8)); cursor:pointer; display:flex; align-items:center; justify-content:center; overflow:visible; padding:0; margin:0; transition:none; }
        .flag-marker img { width:100%; height:100%; object-fit:contain; display:block; margin:0; padding:0; border-radius:4px; }
        .flag-marker .emoji { font-size:100%; line-height:1; }
        .flag-popup .leaflet-popup-content-wrapper { background:rgba(30,30,30,0.95); color:#eee; border-radius:8px; border:1px solid #555; max-width:320px; }
        .flag-popup .leaflet-popup-tip { background:rgba(30,30,30,0.95); }
        .flag-popup .leaflet-popup-content { color:#eee; font-weight:normal; min-width:200px; padding:8px 0; }
        .flag-popup .leaflet-popup-content .flag-title { font-size:16px; font-weight:bold; margin-bottom:4px; }
        .flag-popup .leaflet-popup-content .flag-type { font-size:12px; color:#aaa; margin-bottom:6px; }
        .flag-popup .leaflet-popup-content .flag-preview { margin-top:8px; max-width:100%; border-radius:4px; border:1px solid #444; cursor:pointer; transition:transform 0.2s; position:relative; overflow:hidden; background:#111; }
        .flag-popup .leaflet-popup-content .flag-preview:hover { transform:scale(1.02); }
        .flag-popup .leaflet-popup-content .flag-preview img { width:100%; border-radius:4px; max-height:200px; object-fit:cover; display:block; cursor:pointer; }
        .flag-popup .leaflet-popup-content .flag-preview video { width:100%; border-radius:4px; max-height:200px; display:block; background:#000; cursor:pointer; }
        .flag-popup .leaflet-popup-content .flag-preview iframe { width:100%; height:180px; border:none; border-radius:4px; pointer-events:none; }
        .city-label { font-size:14px; font-weight:bold; color:#000000; text-shadow: -1px -1px 0 #ffffff, 1px -1px 0 #ffffff, -1px 1px 0 #ffffff, 1px 1px 0 #ffffff, 0 0 8px rgba(255,255,255,0.9); background:transparent; padding:2px 6px; border:none; white-space:nowrap; pointer-events:none; font-family:Arial,sans-serif; }
        .leaflet-control-layers { background:rgba(0,0,0,0.8) !important; border:1px solid #444 !important; border-radius:4px !important; }
        .leaflet-control-layers label { color:#ddd !important; }
        .loading-overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:9999; color:#fff; font-size:24px; backdrop-filter:blur(4px); }
        .loading-overlay.hidden { display:none; }
        .loading-spinner { border:4px solid rgba(255,255,255,0.1); border-top:4px solid #ffcc00; border-radius:50%; width:50px; height:50px; animation:spin 1s linear infinite; margin-right:20px; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
        .fullscreen-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; display:none; align-items:center; justify-content:center; flex-direction:column; cursor:pointer; }
        .fullscreen-overlay.active { display:flex; }
        .fullscreen-overlay img { max-width:95%; max-height:85%; object-fit:contain; border-radius:8px; box-shadow:0 0 50px rgba(0,0,0,0.5); }
        .fullscreen-overlay video { max-width:95%; max-height:85%; border-radius:8px; box-shadow:0 0 50px rgba(0,0,0,0.5); }
        .fullscreen-overlay iframe { width:90%; height:80%; border:none; border-radius:8px; box-shadow:0 0 50px rgba(0,0,0,0.5); }
        .fullscreen-overlay .close-btn { position:absolute; top:20px; right:30px; color:#fff; font-size:40px; cursor:pointer; transition:transform 0.3s; z-index:10001; }
        .fullscreen-overlay .close-btn:hover { transform:scale(1.2); }
        .fullscreen-overlay .caption { color:#aaa; font-size:14px; margin-top:15px; text-align:center; max-width:80%; }

            'РФ машина': 'https://cdn.discordapp.com/attachments/1444349422237515888/1521876342256173136/2026-07-01_165244.png?ex=6a466d4b&is=6a451bcb&hm=bb74980fb41291ab1f2548b8083935052e52c2f7d4d06ae658fcf3f6db6ff789',
            'ЗСУ танк': 'https://cdn.discordapp.com/attachments/1444349422237515888/1521876322773635152/2026-07-01_165035.png?ex=6a466d46&is=6a451bc6&hm=6fcbfab58a3a87c5d2b50b7b425333ba0aeab552acfcc1c68ad28ccd86b43aab',
            'РФ танк': 'https://cdn.discordapp.com/attachments/1444349422237515888/1521876324506140822/2026-07-01_165212.png?ex=6a466d46&is=6a451bc6&hm=848805cfe53f0a9facce51db9d5e3973834b6ec5ea33d547e409f7ffeb970f34',
            'ЗСУ БТР': 'https://cdn.discordapp.com/attachments/1444349422237515888/1521876323663085608/2026-07-01_165136.png?ex=6a466d46&is=6a451bc6&hm=c172f5a2974ccf247bcf76e288cd910a2a57cf388fb593b71b763d56283c5f52',
            'РФ БТР': 'https://cdn.discordapp.com/attachments/1444349422237515888/1521876325441208360/2026-07-01_165227.png?ex=6a466d47&is=6a451bc7&hm=dcbe0958172b38d7cdc00a3623cbddcd4a9dce1d9bdd3cfd84fce9321d114d5d',
            'ЗСУ БМП': 'https://cdn.discordapp.com/attachments/1444349422237515888/1521876323155443903/2026-07-01_165117.png?ex=6a466d46&is=6a451bc6&hm=d1ef81b2749c81aef5cf319ab895d859239c8f5d75a02a328af3edecda2666c4',
            'РФ БМП': 'https://cdn.discordapp.com/attachments/1444349422237515888/1521876324862660779/2026-07-01_165216.png?ex=6a466d46&is=6a451bc6&hm=9a47d69109c04d7e9a73d5b43921416933ce82110a308eec3c2d6405f48c5667',
            'ЗСУ мавик': 'https://cdn.discordapp.com/attachments/1444349422237515888/1521876324120133732/2026-07-01_165144.png?ex=6a466d46&is=6a451bc6&hm=566ab176a2e66f126aa6d0345ce8123ab470537b83c519ba3397b88b3f8d5e07',
            'РФ мавик': 'https://cdn.discordapp.com/attachments/1444349422237515888/1521876325755785316/2026-07-01_165234.png?ex=6a466d47&is=6a451bc7&hm=b773efeb85ead922039ba1c61dba48918fa90f581d4d76bedeead0d4524b39a5'
        };

        const BOUNDS = { north:48.47, south:47.97, east:37.65, west:36.93 };
        const CENTER = [(BOUNDS.north+BOUNDS.south)/2, (BOUNDS.east+BOUNDS.west)/2];
        const MIN_ZOOM=10, MAX_ZOOM=18, DEFAULT_ZOOM=11;

        function getFlagSize(zoom) {
            const minSize=18, maxSize=40, minZoom=10, maxZoom=18;
            if(zoom<=minZoom) return minSize;
            if(zoom>=maxZoom) return maxSize;
            const progress = (zoom-minZoom)/(maxZoom-minZoom);
            return Math.round(minSize + progress*(maxSize-minSize));
        }

        function updateFlagSizes() {
            const zoom = map.getZoom();
            const size = getFlagSize(zoom);
            const scaleMultiplier = 1 + (zoom-MIN_ZOOM)/(MAX_ZOOM-MIN_ZOOM)*0.3;
            const finalSize = Math.round(size*scaleMultiplier);
            flagMarkers.forEach(marker => {
                if(marker && marker._icon) {
                    const img = marker._icon.querySelector('img');
                    if(img) {
                        img.style.width = finalSize+'px';
                        img.style.height = finalSize+'px';
                    }
                    marker._icon.style.width = finalSize+'px';
                    marker._icon.style.height = finalSize+'px';
                }
            });
        }

        function openFullscreen(content, caption) {
            const overlay = document.getElementById('fullscreenOverlay');
            const contentDiv = document.getElementById('fullscreenContent');
            const captionDiv = document.getElementById('fullscreenCaption');
            contentDiv.innerHTML = content;
            captionDiv.textContent = caption || '';
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeFullscreen() {
            const overlay = document.getElementById('fullscreenOverlay');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('fullscreenContent').innerHTML = '';
        }

        document.addEventListener('keydown', function(e) {
            if(e.key === 'Escape') closeFullscreen();
        });

        const MAIN_CITIES = [
            { name:'Покровск', lat:48.282, lng:37.183 },
            { name:'Мирноград', lat:48.305, lng:37.265 }
        ];
        const OTHER_CITIES = [
            { name:'Новогродовка', lat:48.270740, lng:37.274723 },
            { name:'Новоукраинка', lat:48.231509, lng:37.079989 },
            { name:'Зверово', lat:48.252784, lng:37.165825 },
            { name:'Попедрищенск', lat:48.219528, lng:37.223911 },
            { name:'Ровное', lat:48.312057, lng:37.202539 },
            { name:'Сухой яр', lat:48.199964, lng:37.339525 },
            { name:'Химическая лаб. МЯУскула', lat:48.183911, lng:37.389425 },
            { name:'Красный яр', lat:48.217868, lng:37.372763 },
            { name:'Восковка', lat:48.329664, lng:37.075081 },
            { name:'Вивальдовое', lat:48.379115, lng:36.944447 },
            { name:'Сергеевка', lat:48.420999, lng:37.049117 },
            { name:'Чушкино', lat:48.382492, lng:37.108533 },
            { name:'Глистовое', lat:48.406141, lng:37.182841 },
            { name:'Завод Им.Тесака', lat:48.421789, lng:37.150875 },
            { name:'Хуевонанное', lat:48.420002, lng:37.131128 },
            { name:'Белицкое', lat:48.420116, lng:37.261527 },
            { name:'Московское', lat:48.216545, lng:37.415019 },
            { name:'Больше Нужнотрахово', lat:48.195023, lng:37.090480 },
            { name:'Астраломатьебетское', lat:48.186039, lng:37.149067 },
            { name:'Нужнотрахово', lat:48.204369, lng:37.043152 },
            { name:'Малое нужнотрахово', lat:48.190245, lng:36.993826 },
            { name:'Песчаное', lat:48.264584, lng:36.994658 },
            { name:'Котлино', lat:48.254163, lng:37.050083 }
        ];

        function initMap() {
            map = L.map('map', {
                center: CENTER,
                zoom: DEFAULT_ZOOM,
                minZoom: MIN_ZOOM,
                maxZoom: MAX_ZOOM,
                zoomControl: false,
                attributionControl: true,
                maxBounds: [[BOUNDS.south-0.1, BOUNDS.west-0.1], [BOUNDS.north+0.1, BOUNDS.east+0.1]],
                maxBoundsViscosity: 1.0
            });

            const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '&copy; <a href="https://www.esri.com">ESRI</a> | Спутник',
                maxZoom: 19,
                minZoom: MIN_ZOOM
            }).addTo(map);

            const street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                maxZoom: 19,
                minZoom: MIN_ZOOM
            });

            const baseMaps = { "🛰️ Спутник": satellite, "🗺️ Схема": street };
            L.control.layers(baseMaps, null, { position:'topright' }).addTo(map);

            L.control.zoom({ position:'bottomright' }).addTo(map);

            map.on('mousemove', function(e) {
                if(e && e.latlng) {
                    const lat = e.latlng.lat.toFixed(6);
                    const lng = e.latlng.lng.toFixed(6);
                    document.getElementById('coordDisplay').textContent = `🌍 широта: ${lat}  долгота: ${lng}`;
                }
            });

            map.on('zoomend', function() {
                updateCitiesVisibility();
                updateFlagSizes();
            });

            drawBoundsAndCities();
            loadPreloadedData();
        }

        function loadPreloadedData() {
            try {
                const data = PRELOADED_GEOJSON;
                data.features.forEach(feat => {
                    const geom = feat.geometry, props = feat.properties || {};
                    if(geom.type === 'Polygon' && props.type === 'polygon') {
                        const coords = geom.coordinates[0].map(c => [c[1], c[0]]);
                        if(coords.length > 1 && coords[0][0] === coords[coords.length-1][0] && coords[0][1] === coords[coords.length-1][1]) coords.pop();
                        const color = props.color || 'blue';
                        L.polygon(coords, {
                            color: color === 'blue' ? '#4488ff' : '#ff6666',
                            fillColor: color === 'blue' ? 'rgba(68,136,255,0.2)' : 'rgba(255,102,102,0.2)',
                            fillOpacity: 0.3, weight: 2, opacity: 0.9, interactive: false
                        }).addTo(map);
                    }
                    if(geom.type === 'Point' && props.type === 'flag') {
                        addFlagToMap([geom.coordinates[1], geom.coordinates[0]], props.text || '', props.flagType || 'ЗСУ', props.url || '');
                    }
                });
                setTimeout(() => {
                    updateFlagSizes();
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }, 500);
            } catch(err) {
                console.error('Ошибка загрузки данных:', err);
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        function updateCitiesVisibility() {
            const zoom = map.getZoom();
            cityMarkers.forEach(marker => {
                if(marker) {
                    if(zoom >= 12) map.addLayer(marker);
                    else map.removeLayer(marker);
                }
            });
        }

        function drawBoundsAndCities() {
            const bounds = [
                [BOUNDS.north, BOUNDS.west],
                [BOUNDS.north, BOUNDS.east],
                [BOUNDS.south, BOUNDS.east],
                [BOUNDS.south, BOUNDS.west],
                [BOUNDS.north, BOUNDS.west]
            ];
            L.polyline(bounds, {
                color: '#ffcc00', weight: 2, opacity: 0.4, dashArray: '8, 8',
                fill: true, fillColor: 'rgba(255,204,0,0.05)', fillOpacity: 0.1, interactive: false
            }).addTo(map);

            MAIN_CITIES.forEach(city => {
                const icon = L.divIcon({ className:'city-label', html:city.name, iconSize:[0,0], iconAnchor:[0,0] });
                L.marker([city.lat, city.lng], { icon, interactive:false, keyboard:false }).addTo(map);
            });

            OTHER_CITIES.forEach(city => {
                const icon = L.divIcon({ className:'city-label', html:city.name, iconSize:[0,0], iconAnchor:[0,0] });
                const marker = L.marker([city.lat, city.lng], { icon, interactive:false, keyboard:false });
                cityMarkers.push(marker);
                if(map.getZoom() >= 12) marker.addTo(map);
            });
        }

        function createFlagIcon(type) {
            const imageUrl = FLAG_IMAGES[type];
            if(!imageUrl) return L.divIcon({ className:'flag-marker', html:'<span class="emoji">🚩</span>', iconSize:[32,32], iconAnchor:[16,16] });
            const zoom = map ? map.getZoom() : DEFAULT_ZOOM;
            const size = getFlagSize(zoom);
            const scaleMultiplier = 1 + (zoom-MIN_ZOOM)/(MAX_ZOOM-MIN_ZOOM)*0.3;
            const finalSize = Math.round(size*scaleMultiplier);
            return L.divIcon({
                className:'flag-marker',
                html:`<img src="${imageUrl}" alt="${type}" style="width:${finalSize}px;height:${finalSize}px;border-radius:4px;" onerror="this.parentElement.innerHTML='<span class=\\'emoji\\' style=\\'font-size:${finalSize}px;\\'>🚩</span>'">`,
                iconSize:[finalSize, finalSize],
                iconAnchor:[finalSize/2, finalSize/2]
            });
        }

        function isVideoUrl(url) { return /\.(mp4|webm|ogg|mov|avi|mkv)$/i.test(url) || /(youtube\.com|youtu\.be|vimeo\.com)/i.test(url); }
        function isImageUrl(url) { return /\.(jpeg|jpg|gif|png|webp|bmp|svg)$/i.test(url) || /(imgur\.com|i\.ytimg\.com|discordapp\.net|images-ext)/i.test(url); }
        function getEmbedUrl(url) {
            const youtubeMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);
            if(youtubeMatch) return `https://www.youtube.com/embed/${youtubeMatch[1]}`;
            const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
            if(vimeoMatch) return `https://player.vimeo.com/video/${vimeoMatch[1]}`;
            return url;
        }

        function addFlagToMap(latlng, text, type, url) {
            const icon = createFlagIcon(type);
            const marker = L.marker(latlng, { icon, riseOnHover:true, interactive:true }).addTo(map);
            flagMarkers.push(marker);

            let previewHtml = '';
            if(url && url.trim()) {
                const isVideo = isVideoUrl(url);
                const isImage = isImageUrl(url);
                if(isVideo) {
                    const embedUrl = getEmbedUrl(url);
                    if(embedUrl.includes('youtube.com/embed') || embedUrl.includes('player.vimeo.com')) {
                        previewHtml = `<div class="flag-preview" onclick="event.stopPropagation(); openFullscreen('<iframe src=\\'${embedUrl}\\' allowfullscreen style=\\'width:100%;height:100%;border:none;\\'></iframe>', '${text || type}')"><iframe src="${embedUrl}" allowfullscreen loading="lazy" frameborder="0" style="pointer-events:none;"></iframe></div>`;
                    } else {
                        previewHtml = `<div class="flag-preview" onclick="event.stopPropagation(); openFullscreen('<video controls autoplay style=\\'width:100%;height:100%;\\'><source src=\\'${url}\\' type=\\'video/mp4\\'>Ваш браузер не поддерживает видео</video>', '${text || type}')"><video controls style="width:100%; max-height:200px; border-radius:4px; background:#000; pointer-events:none;"><source src="${url}" type="video/mp4"></video></div>`;
                    }
                } else if(isImage) {
                    previewHtml = `<div class="flag-preview" onclick="event.stopPropagation(); openFullscreen('<img src=\\'${url}\\' style=\\'width:100%;height:100%;object-fit:contain;\\'>', '${text || type}')"><img src="${url}" alt="Preview" loading="lazy"></div>`;
                } else {
                    previewHtml = `<div class="flag-preview" onclick="event.stopPropagation(); window.open('${url}', '_blank')" style="cursor:pointer; padding:10px; text-align:center; background:rgba(255,255,255,0.05);"><span style="color:#66ccff;">🔗 Открыть ссылку</span></div>`;
                }
            }

            const popupContent = `<div class="flag-title">${type}</div><div class="flag-type">📍 ${latlng[0].toFixed(5)}, ${latlng[1].toFixed(5)}</div>${text ? `<div style="margin-bottom:6px;font-size:14px;">📝 ${text}</div>` : ''}${previewHtml}`;
            const popup = L.popup({ className:'flag-popup', content:popupContent, offset:[0,-10], maxWidth:320, minWidth:250 });
            marker.bindPopup(popup);
        }

        document.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
